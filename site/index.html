<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAVERN</title>
  <meta name="description" content="LAVERN — The world's first driverless law firm.">
  <meta name="theme-color" content="#080808">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    /* Custom cursor — hide native on desktop */
    @media(pointer:fine){*,*::before,*::after{cursor:none!important}}
    :root{
      --dark:#080808;--text:#FAF9F6;--muted:rgba(250,249,246,0.4);--dim:rgba(250,249,246,0.12);
      --accent:#E8845C;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Inter',-apple-system,sans-serif;
      --ease:cubic-bezier(0.16,1,0.3,1)
    }
    html{scroll-behavior:smooth}
    body{
      font-family:var(--sans);background:var(--dark);color:var(--text);
      -webkit-font-smoothing:antialiased;overflow-x:hidden
    }

    /* Film grain */
    @keyframes grain{
      0%,100%{transform:translate(0,0)}
      10%{transform:translate(-5%,-10%)}
      20%{transform:translate(-15%,5%)}
      30%{transform:translate(7%,-25%)}
      40%{transform:translate(-5%,25%)}
      50%{transform:translate(-15%,10%)}
      60%{transform:translate(15%,0)}
      70%{transform:translate(0,15%)}
      80%{transform:translate(3%,-35%)}
      90%{transform:translate(-10%,10%)}
    }
    body::after{
      content:'';position:fixed;inset:-50%;z-index:9999;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:256px 256px;
      opacity:0.35;
      animation:grain 8s steps(10) infinite;
      mix-blend-mode:overlay
    }
    @media(prefers-reduced-motion:reduce){body::after{animation:none}}

    /* Word-by-word reveal */
    [data-words] .w{display:inline-block;opacity:0;transform:translateY(12px);transition:opacity 0.6s var(--ease),transform 0.6s var(--ease)}
    [data-words].revealed .w{opacity:1;transform:translateY(0)}

    /* Reveals */
    .r{opacity:0;transform:translateY(50px);transition:opacity 1.2s var(--ease),transform 1.2s var(--ease)}
    .r.v{opacity:1;transform:translateY(0)}
    .r1{transition-delay:.15s}.r2{transition-delay:.3s}.r3{transition-delay:.45s}
    @media(prefers-reduced-motion:reduce){.r{opacity:1;transform:none;transition:none}}

    /* ═══════════════════════════════════════
       1. LOGO — top-left, just the mark
       ═══════════════════════════════════════ */
    .logo{
      position:fixed;top:32px;left:40px;z-index:100;
      font-family:var(--serif);font-size:18px;font-weight:300;
      color:var(--text);text-decoration:none;letter-spacing:8px;
      mix-blend-mode:difference
    }
    .login{
      position:fixed;top:36px;right:40px;z-index:100;
      font-family:var(--serif);font-size:14px;font-weight:300;font-style:italic;
      color:var(--text);text-decoration:none;letter-spacing:0;
      mix-blend-mode:difference;opacity:.45;
      transition:opacity .4s var(--ease)
    }
    .login:hover{opacity:1}

    /* ═══════════════════════════════════════
       2. HERO
       ═══════════════════════════════════════ */
    .hero{
      min-height:100vh;min-height:100dvh;position:relative;overflow:hidden;
      display:flex;align-items:center;justify-content:center;text-align:center
    }
    .hero-img{
      position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
      animation:drift 25s ease-in-out infinite alternate
    }
    @keyframes drift{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.06) translate(-1%,1%)}}
    .hero::before{
      content:'';position:absolute;top:0;left:0;right:0;height:35%;z-index:1;
      background:linear-gradient(to top,transparent,var(--dark));pointer-events:none
    }
    .hero::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:50%;z-index:1;
      background:linear-gradient(to bottom,transparent 0%,var(--dark) 85%);pointer-events:none
    }
    .hero-fog-left{
      position:absolute;top:0;left:0;bottom:0;width:25%;z-index:1;
      background:linear-gradient(to right,rgba(8,8,8,0.7),transparent);pointer-events:none
    }
    .hero-fog-right{
      position:absolute;top:0;right:0;bottom:0;width:25%;z-index:1;
      background:linear-gradient(to left,rgba(8,8,8,0.7),transparent);pointer-events:none
    }
    .hero-content{position:relative;z-index:2;padding:24px;max-width:900px}
    .hero h1{
      font-family:var(--serif);font-size:clamp(56px,11vw,140px);
      font-weight:300;line-height:.95;letter-spacing:-2px;margin-bottom:48px;
      text-shadow:0 4px 80px rgba(0,0,0,.6)
    }
    .hero h1 em{font-style:italic;display:block}

    /* Apply button — dark, rounded pill */
    .btn-invite{
      display:inline-flex;align-items:center;gap:10px;
      font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;
      text-decoration:none;color:var(--text);
      background:#000;
      padding:20px 56px;border-radius:100px;border:1px solid rgba(255,255,255,0.06);
      cursor:pointer;transition:all .5s var(--ease);
      box-shadow:0 4px 30px rgba(0,0,0,0.4)
    }
    .btn-invite:hover{
      background:#181818;border-color:rgba(255,255,255,0.15);
      transform:translateY(-2px);
      box-shadow:0 8px 40px rgba(0,0,0,0.5)
    }
    .btn-demo{
      display:inline-block;margin-top:20px;
      font-family:var(--serif);font-size:15px;font-weight:300;font-style:italic;
      color:var(--muted);text-decoration:none;letter-spacing:0;
      transition:color .4s var(--ease)
    }
    .btn-demo:hover{color:var(--text)}

    .hero-scroll{
      position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:3;
      display:flex;flex-direction:column;align-items:center;gap:10px
    }
    .hero-scroll span{font-size:9px;font-weight:500;letter-spacing:5px;text-transform:uppercase;color:var(--dim)}
    .pulse-line{
      width:1px;height:36px;background:linear-gradient(to bottom,var(--dim),transparent);
      animation:pulse 2.5s ease-in-out infinite
    }
    @keyframes pulse{0%,100%{opacity:.2;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.3)}}

    /* ═══════════════════════════════════════
       3. STATEMENT — text over image, stronger contrast
       ═══════════════════════════════════════ */
    .statement{
      min-height:80vh;position:relative;overflow:hidden;
      display:flex;align-items:center;justify-content:center;text-align:center
    }
    .statement-img{
      position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
      filter:brightness(0.45)
    }
    .statement::before{
      content:'';position:absolute;top:0;left:0;right:0;height:50%;z-index:1;
      background:linear-gradient(to top,transparent,var(--dark));pointer-events:none
    }
    .statement::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:50%;z-index:1;
      background:linear-gradient(to bottom,transparent,var(--dark));pointer-events:none
    }
    /* Dark vignette overlay for readability */
    .statement-overlay{
      position:absolute;inset:0;z-index:1;
      background:radial-gradient(ellipse at center,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.6) 100%);
      pointer-events:none
    }
    .statement-text{
      position:relative;z-index:2;font-family:var(--serif);
      font-size:clamp(40px,8vw,100px);font-weight:300;line-height:1.05;
      max-width:800px;padding:24px;
      text-shadow:0 2px 40px rgba(0,0,0,.8),0 8px 80px rgba(0,0,0,.5)
    }
    .statement-text em{
      font-style:italic;
      background:linear-gradient(135deg,var(--accent),#E0B888);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      filter:drop-shadow(0 2px 24px rgba(212,144,96,.35))
    }

    /* ═══════════════════════════════════════
       4. ART ROW with pull quote
       ═══════════════════════════════════════ */
    /* Unified fog system for all images */
    .fog{position:relative;overflow:hidden}
    .fog::before{
      content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
      box-shadow:inset 0 0 120px 60px var(--dark)
    }

    .art-card{
      padding:0 24px;max-width:1200px;margin:0 auto
    }
    .art-card-inner{
      border-radius:28px;overflow:hidden;position:relative;
      box-shadow:0 60px 120px rgba(0,0,0,.6),0 0 60px rgba(196,93,62,.04)
    }
    .art-card-inner img{width:100%;display:block;height:auto}

    .art-quote-row{
      display:grid;grid-template-columns:1fr 1fr;gap:0;
      max-width:1200px;margin:0 auto;padding:0 24px;
      min-height:520px;position:relative
    }
    /* Fog over the image side only — left/top/bottom edges dissolve into dark */
    .art-quote-row::before{
      content:'';position:absolute;top:0;bottom:0;left:0;width:50%;z-index:2;pointer-events:none;
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      mask-image:
        linear-gradient(to top, black 0%, transparent 40%),
        linear-gradient(to bottom, black 0%, transparent 40%),
        linear-gradient(to right, black 0%, transparent 30%);
      -webkit-mask-image:
        linear-gradient(to top, black 0%, transparent 40%),
        linear-gradient(to bottom, black 0%, transparent 40%),
        linear-gradient(to right, black 0%, transparent 30%);
      mask-composite:add;-webkit-mask-composite:source-over;
      background:
        linear-gradient(to top, var(--dark) 0%, transparent 40%),
        linear-gradient(to bottom, var(--dark) 0%, transparent 40%),
        linear-gradient(to right, var(--dark) 0%, transparent 30%)
    }
    /* Soft blend — stays within image column, never touches quote text */
    .art-quote-row::after{
      content:'';position:absolute;top:0;bottom:0;left:35%;width:15%;z-index:2;pointer-events:none;
      background:linear-gradient(to right, transparent 0%, var(--dark) 100%)
    }
    .art-quote-img{
      border-radius:24px;overflow:hidden;position:relative;
      box-shadow:0 40px 80px rgba(0,0,0,.5)
    }
    .art-quote-img img{width:100%;height:100%;object-fit:cover;display:block}

    .art-quote-text{
      display:flex;flex-direction:column;justify-content:center;
      padding:40px 48px 40px 64px;
      will-change:transform
    }
    .art-quote-text .pull-quote{
      transition:transform 0.1s linear;will-change:transform;
      transform:translateY(40px)
    }
    .pull-quote{
      font-family:var(--serif);font-style:italic;font-weight:300;
      font-size:clamp(24px,3.5vw,42px);line-height:1.35;
      color:var(--text)
    }
    .pull-quote-attr{
      font-family:var(--sans);font-size:11px;font-weight:500;
      letter-spacing:3px;text-transform:uppercase;color:var(--muted)
    }
    .quote-attr{
      display:block;margin-top:16px;
      font-family:var(--sans);font-size:11px;font-weight:400;
      letter-spacing:2px;text-transform:uppercase;color:var(--muted)
    }
    .solo-quote{
      max-width:800px;margin:0 auto;padding:80px 24px;text-align:center
    }

    /* ═══════════════════════════════════════
       5. VIDEO SECTION — embedded, framed
       ═══════════════════════════════════════ */
    .video-section{padding:clamp(80px,14vw,200px) 24px}
    .video-label{
      text-align:center;font-family:var(--serif);
      font-size:clamp(36px,6vw,72px);font-weight:300;line-height:1.1;
      margin-bottom:clamp(48px,8vw,96px)
    }
    .video-glow{
      position:relative;max-width:1000px;margin:0 auto;isolation:isolate
    }
    .video-glow::before{
      content:'';position:absolute;
      top:50%;left:50%;transform:translate(-50%,-50%);
      width:320%;height:350%;
      background:radial-gradient(ellipse at center,
        rgba(232,132,92,0.9) 0%,
        rgba(232,132,92,0.5) 15%,
        rgba(200,110,80,0.25) 30%,
        rgba(150,80,50,0.1) 50%,
        transparent 65%);
      filter:blur(120px);
      pointer-events:none;z-index:-1
    }
    .video-wrap{
      max-width:1000px;margin:0 auto;
      background:#0a0a0a;border-radius:20px;overflow:hidden;
      border:1px solid rgba(255,255,255,.06);
      box-shadow:
        0 100px 200px rgba(0,0,0,.8),
        0 50px 100px rgba(0,0,0,.5),
        0 0 120px rgba(232,132,92,.04),
        0 0 0 1px rgba(255,255,255,.03) inset;
      mask-image:none;
      -webkit-mask-image:none
    }
    .video-chrome{
      display:flex;align-items:center;gap:7px;padding:14px 20px;
      background:#0d0d0d;border-bottom:1px solid rgba(255,255,255,.05)
    }
    .dot{width:10px;height:10px;border-radius:50%}
    .dot-r{background:#ff5f57}.dot-y{background:#febc2e}.dot-g{background:#28c840}
    .video-chrome-url{flex:1;text-align:center;font-size:11px;color:rgba(255,255,255,.18);font-weight:500}
    .video-container{
      position:relative;width:100%;padding-bottom:56.25%;
      background:#000
    }
    .video-container iframe{
      position:absolute;top:0;left:0;width:100%;height:100%;border:none
    }
    /* Placeholder state before video loads or if no video yet */
    .video-placeholder{
      position:absolute;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:20px;background:#0a0a0a;cursor:pointer
    }
    .video-play{
      width:80px;height:80px;border-radius:50%;
      background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
      display:flex;align-items:center;justify-content:center;
      transition:all .4s var(--ease)
    }
    .video-placeholder:hover .video-play{
      background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);
      transform:scale(1.08)
    }
    .video-play-arrow{
      width:0;height:0;border-style:solid;
      border-width:12px 0 12px 22px;
      border-color:transparent transparent transparent rgba(255,255,255,0.5);
      margin-left:4px
    }
    .video-soon{
      font-size:10px;font-weight:500;letter-spacing:4px;text-transform:uppercase;
      color:rgba(255,255,255,0.2)
    }

    /* ═══════════════════════════════════════
       6. CTA
       ═══════════════════════════════════════ */
    .cta{
      min-height:90vh;position:relative;overflow:hidden;
      display:flex;align-items:center;justify-content:center;text-align:center
    }
    .cta-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .cta::before{
      content:'';position:absolute;top:0;left:0;right:0;height:50%;z-index:1;
      background:linear-gradient(to top,transparent,var(--dark));pointer-events:none
    }
    .cta::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:50%;z-index:1;
      background:linear-gradient(to bottom,transparent,var(--dark));pointer-events:none
    }
    .cta-content{position:relative;z-index:2;padding:24px}
    .cta-title{
      font-family:var(--serif);font-size:clamp(48px,9vw,120px);
      font-weight:300;line-height:.95;margin-bottom:40px;
      text-shadow:0 4px 60px rgba(0,0,0,.5)
    }
    .cta-title em{font-style:italic}

    /* Mist — soft fog rising from the bottom of the page */
    .smoke{
      position:fixed;bottom:0;left:0;right:0;height:40vh;pointer-events:none;z-index:9998;
      background:linear-gradient(to top,
        var(--dark) 0%,
        rgba(8,8,8,0.85) 20%,
        rgba(8,8,8,0.5) 45%,
        rgba(8,8,8,0.15) 70%,
        transparent 100%
      )
    }

    /* Footer */
    .footer{
      padding:48px 24px 32px;border-top:1px solid rgba(255,255,255,.04);
      display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:24px;
      max-width:1200px;margin:0 auto
    }
    .footer-left{display:flex;align-items:center;gap:24px}
    .footer-mark{font-family:var(--serif);font-size:16px;font-weight:300;letter-spacing:8px;color:var(--text)}
    .footer-link{font-size:12px;color:var(--muted);text-decoration:none;transition:color .2s}
    .footer-link:hover{color:var(--text)}
    .footer-right{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase}

    /* Spacers */
    .sp{height:clamp(80px,12vw,160px)}
    .sp-lg{height:clamp(120px,16vw,240px)}

    /* Responsive */
    @media(max-width:1024px){
      .art-quote-row{grid-template-columns:1fr;min-height:auto}
      .art-quote-text{padding:40px 24px}
      /* Disable side fog when stacked — use simple vertical fade instead */
      .art-quote-row::before{
        width:100%;
        mask-image:
          linear-gradient(to top, black 0%, transparent 30%),
          linear-gradient(to bottom, black 0%, transparent 30%);
        -webkit-mask-image:
          linear-gradient(to top, black 0%, transparent 30%),
          linear-gradient(to bottom, black 0%, transparent 30%);
        background:
          linear-gradient(to top, var(--dark) 0%, transparent 30%),
          linear-gradient(to bottom, var(--dark) 0%, transparent 30%)
      }
      .art-quote-row::after{display:none}
    }
    @media(max-width:768px){
      /* ── Mobile: hero + footer only, single screen, no scroll ── */
      .statement,.art-quote-row,.video-section,.cta,.sp,.sp-lg,.hero-scroll{display:none !important}
      html,body{overflow:hidden;height:100vh;height:100dvh}
      .login{display:none}
      .logo{top:20px;left:20px;font-size:15px;letter-spacing:6px}
      .hero h1{letter-spacing:-1px;margin-bottom:36px}
      /* Disable ALL image animation/transform on mobile */
      .hero-img{animation:none !important;transform:none !important}
      /* Fix iOS Safari viewport resize — lock hero height, +1px kills sub-pixel seam */
      .hero{min-height:calc(100vh + 1px);min-height:calc(100dvh + 1px);max-height:calc(100vh + 1px);max-height:calc(100dvh + 1px);overflow:hidden}
      .hero-img{position:absolute;top:0;left:0;width:100%;height:calc(100vh + 1px);height:calc(100dvh + 1px);object-fit:cover}
      .btn-invite{padding:16px 44px;font-size:10px}
      .btn-invite:hover{transform:none}
      .hero::after{height:40%}
      .smoke{height:35vh}
      /* Footer — single clean row, no border */
      .footer{padding:16px 20px;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:transparent;border-top:none;flex-direction:row;align-items:center;justify-content:space-between;flex-wrap:nowrap;gap:0;max-width:none;margin:0}
      .footer-left{flex-direction:row;align-items:center;gap:0}
      .footer-mark{font-size:13px;letter-spacing:6px}
      .footer-right{font-size:9px;letter-spacing:2px}
      .footer-right a{color:var(--muted);text-decoration:none}
      /* Hide footer links — architecture link is in top-right via .arch-link */
      .footer-link{display:none}
    }
    @media(max-width:420px){
      .logo{top:16px;left:16px;font-size:13px;letter-spacing:5px}
      .hero-content{padding:16px}
      .hero h1{font-size:clamp(40px,12vw,56px)}
      .btn-invite{padding:14px 36px;font-size:9px;letter-spacing:2px}
    }

    /* The Architecture — desktop: hidden (it's in the footer). Mobile: top-right fixed. */
    .arch-link{display:none}
    @media(max-width:768px){
      .arch-link{display:block;position:fixed;top:22px;right:20px;z-index:100;font-family:var(--sans);font-size:10px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--text);text-decoration:none;mix-blend-mode:difference;opacity:.45}
    }
    .skip-link{position:absolute;top:-100px;left:0;background:var(--accent);color:#fff;padding:12px 24px;z-index:10001;font-size:14px;text-decoration:none}
    .skip-link:focus{top:0}
    a:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  </style>
</head>
<body>
  <script defer data-domain="lavern.ai" src="https://plausible.io/js/script.js"></script>
  <a href="#main" class="skip-link">Skip to content</a>

  <!-- 1. Logo only — top left, nothing else -->
  <a href="#" class="logo">LAVERN</a>
  <a href="#" class="login">Log In</a>

  <main id="main">

    <!-- ═══════ HERO ═══════ -->
    <section class="hero">
      <img src="img/hero.jpg" alt="" role="presentation" class="hero-img" loading="eager">
      <div class="hero-fog-left"></div>
      <div class="hero-fog-right"></div>
      <div class="hero-content">
        <h1 class="r">Excellence<br>doesn't scale.<br><em>Until now.</em></h1>
        <a href="https://app.lavern.ai/#/demo" class="btn-invite r r1">Talk is cheap</a>
      </div>
    </section>

    <div class="sp-lg"></div>

    <!-- ═══════ STATEMENT — darkened image for text visibility ═══════ -->
    <section class="statement">
      <img src="img/statement.jpg" alt="" role="presentation" class="statement-img" loading="lazy">
      <div class="statement-overlay"></div>
      <p class="statement-text r">Law firms sell hours.<br>We sell <em>answers.</em></p>
    </section>

    <!-- ═══════ Art + pull quote ═══════ -->
    <div class="sp-lg"></div>
    <div class="art-quote-row">
      <div class="art-quote-img r">
        <img src="img/detail.jpg" alt="" role="presentation" loading="lazy">
      </div>
      <div class="art-quote-text r r1">
        <p class="pull-quote" data-words>"This might be the strangest legal tech tool I have ever seen." — GC</p>
      </div>
    </div>
    <div class="sp-lg"></div>

    <!-- ═══════ VIDEO — framed like Vesence ═══════ -->
    <section class="video-section">
      <h2 class="video-label r">It is a law firm.<br>Just that the offices are in a Mac Mini.</h2>
      <div class="video-glow">
        <div class="video-wrap fog r r1">
          <div class="video-chrome">
            <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
            <div class="video-chrome-url">lavern.ai</div>
          </div>
          <div class="video-container">
            <video autoplay muted loop playsinline style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover">
              <source src="demo.mov" type="video/quicktime">
              <source src="demo.mp4" type="video/mp4">
            </video>
          </div>
        </div>
      </div>
    </section>

    <div class="sp-lg"></div>

    <!-- ═══════ CTA ═══════ -->
    <section class="cta">
      <img src="img/cta.jpg" alt="" role="presentation" class="cta-img" loading="lazy">
      <div class="cta-content">
        <h2 class="cta-title r"><em>Speak to Us.</em></h2>
        <a href="mailto:hello@lavern.ai?subject=Knock%20Knock&body=I%E2%80%99d%20like%20to%20see%20a%20demo." class="btn-invite r r1">Knock</a>
      </div>
    </section>

  </main>

  <div class="smoke"></div>

  <footer class="footer">
    <div class="footer-left">
      <span class="footer-mark">LAVERN</span>
    </div>
  </footer>

  <script>
    const obs=window.IntersectionObserver
      ?new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('v');obs.unobserve(x.target)}}),{threshold:.06,rootMargin:'0px 0px -80px 0px'})
      :null;
    document.querySelectorAll('.r').forEach(el=>obs?obs.observe(el):el.classList.add('v'));

    // Word-by-word reveal for pull quote
    document.querySelectorAll('[data-words]').forEach(el=>{
      const text=el.textContent;
      el.innerHTML=text.split(/(\s+)/).map(w=>
        /^\s+$/.test(w)?w:`<span class="w" style="transition-delay:${0}ms">${w}</span>`
      ).join('');
      // Set staggered delays
      let i=0;
      el.querySelectorAll('.w').forEach(w=>{w.style.transitionDelay=`${i*70}ms`;i++});
      // Trigger on scroll
      const wObs=new IntersectionObserver(e=>{
        if(e[0].isIntersecting){el.classList.add('revealed');wObs.disconnect()}
      },{threshold:0.3});
      wObs.observe(el);
    });

    // Subtle parallax on full-bleed art (desktop only)
    if(window.innerWidth>768){
      let t=false;
      addEventListener('scroll',()=>{
        if(!t){requestAnimationFrame(()=>{
          document.querySelectorAll('.hero-img,.statement-img,.cta-img').forEach(img=>{
            const r=img.parentElement.getBoundingClientRect();
            const off=(r.top+r.height/2-innerHeight/2)*0.03;
            img.style.transform=`translateY(${off}px) scale(1.06)`;
          });
          t=false;
        });t=true}
      },{passive:true});
    }

    // Autoplay video when visible (iOS Safari needs a nudge)
    const vid=document.querySelector('.video-container video');
    if(vid){
      const vObs=new IntersectionObserver(e=>{
        if(e[0].isIntersecting){vid.play().catch(()=>{});vObs.disconnect()}
      },{threshold:0.3});
      vObs.observe(vid);
    }

    // Quote parallax — rises on scroll, stops before hitting video-label
    const qWrap=document.querySelector('.art-quote-text');
    const qText=qWrap&&qWrap.querySelector('.pull-quote');
    const vLabel=document.querySelector('.video-label');
    if(qText&&vLabel){
      addEventListener('scroll',()=>{
        requestAnimationFrame(()=>{
          const rect=qWrap.getBoundingClientRect();
          const progress=(rect.top+rect.height/2-innerHeight/2)/innerHeight;
          // Text rises as you scroll past — moves UP, never toward video-label
          const y=10+progress*30;
          qText.style.transform=`translateY(${y}px)`;
        });
      },{passive:true});
    }

    // Smooth anchor
    document.querySelectorAll('a[href^="#"]').forEach(a=>
      a.addEventListener('click',e=>{const t=document.querySelector(a.getAttribute('href'));if(t){e.preventDefault();t.scrollIntoView({behavior:'smooth'})}})
    );

    // Mist — fade out when near bottom of page so footer is visible
    const smokeEl=document.querySelector('.smoke');
    if(smokeEl){
      addEventListener('scroll',()=>{
        const distFromBottom=document.documentElement.scrollHeight-window.scrollY-window.innerHeight;
        smokeEl.style.opacity=distFromBottom<200?String(distFromBottom/200):'1';
      },{passive:true});
    }

    // Magnetic buttons — pull towards cursor on hover (fine pointer / desktop only)
    if(matchMedia('(pointer:fine)').matches){
      document.querySelectorAll('.btn-invite, .login, .footer-link').forEach(btn=>{
        btn.addEventListener('mousemove',e=>{
          const r=btn.getBoundingClientRect();
          const x=e.clientX-r.left-r.width/2;
          const y=e.clientY-r.top-r.height/2;
          btn.style.transform=`translate(${x*0.3}px,${y*0.3}px)`;
          btn.style.transition='transform 0.15s ease-out';
        });
        btn.addEventListener('mouseleave',()=>{
          btn.style.transform='translate(0,0)';
          btn.style.transition='transform 0.5s var(--ease)';
        });
      });
    }

    // Custom cursor (desktop only — fine pointer)
    if(matchMedia('(pointer:fine)').matches){
      const dot=document.createElement('div');
      const trail=document.createElement('div');
      Object.assign(dot.style,{position:'fixed',width:'8px',height:'8px',borderRadius:'50%',background:'#fff',pointerEvents:'none',zIndex:'99999',mixBlendMode:'difference',left:'-100px',top:'-100px',transition:'width 0.2s,height 0.2s,background 0.2s,border 0.2s'});
      Object.assign(trail.style,{position:'fixed',width:'32px',height:'32px',borderRadius:'50%',background:'rgba(255,255,255,0.12)',filter:'blur(8px)',pointerEvents:'none',zIndex:'99998',mixBlendMode:'difference',left:'-100px',top:'-100px'});
      document.body.appendChild(dot);
      document.body.appendChild(trail);
      const mouse={x:-100,y:-100},tPos={x:-100,y:-100};
      let hovering=false;
      document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY},{passive:true});
      document.addEventListener('mouseover',e=>{
        hovering=!!e.target.closest('a,button,[role="button"],input,select,textarea,[tabindex]:not([tabindex="-1"]),label[for],summary');
        if(hovering){dot.style.width='16px';dot.style.height='16px';dot.style.background='transparent';dot.style.border='1.5px solid rgba(255,255,255,0.6)'}
        else{dot.style.width='8px';dot.style.height='8px';dot.style.background='#fff';dot.style.border='none'}
      });
      document.addEventListener('mouseout',()=>{if(!hovering)return;hovering=false;dot.style.width='8px';dot.style.height='8px';dot.style.background='#fff';dot.style.border='none'});
      (function tick(){
        tPos.x+=(mouse.x-tPos.x)*0.12;
        tPos.y+=(mouse.y-tPos.y)*0.12;
        dot.style.left=(mouse.x-parseInt(dot.style.width)/2)+'px';
        dot.style.top=(mouse.y-parseInt(dot.style.height)/2)+'px';
        trail.style.left=(tPos.x-16)+'px';
        trail.style.top=(tPos.y-16)+'px';
        requestAnimationFrame(tick);
      })();
    }
  </script>
</body>
</html>
